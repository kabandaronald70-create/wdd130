<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>Contact Us | White Water Rafting Adventures/<title>

            <meta name="author" content="Ronald Kabanda">
            <meta name="description"
              content="Contact White Water Rafting for questions, reservations, or feedback. Reach us by phone, email, or visit our location. We're here to help you plan your next river adventure!">
            <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/rafting.jpg" alt="White Water Rafting Company Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <!-- Company Information Section -->
        <section class="company-info">
            <h1>White Water Rafting Company</h1>
            <div class="company-details">
                <p>123 Main River Street</p>
                <p>Kolob, California</p>
                <p>+1 999 999 9999</p>
                <p>info@whitewater.com</p>
            </div>

            <!-- Embedded Google Map -->
            <div class="map-container">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.8354345098676!2d-122.4194186846816!3d37.77492927975947!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085808c4e7f5e5d%3A0x5a3b5e5e5e5e5e5e!2sSan%20Francisco%2C%20CA!5e0!3m2!1sen!2sus!4v1647890123456!5m2!1sen!2sus"
                  width="100%" height="400" allowfullscreen="" loading="lazy">
                </iframe>
            </div>
        </section>

        <!-- Contact Form Section -->
        <section class="contact-form">
            <h2>Get in Touch!</h2>
            <form action="#" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your name."
                          required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Enter your Email."
                          required>
                    </div>
                </div>

                <div class="purpose-group">
                    <label>Purpose</label>
                    <div class="radio-options">
                        <label class="radio-option">
                            <input type="radio" name="purpose" value="general" required> General
                            Inquiry
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="purpose" value="reservation"> Reservation
                            Question
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="purpose" value="suggestion"> Website
                            Suggestion
                        </label>
                    </div>
                </div>

                <div class="message-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Type here"
                      required></textarea>
                </div>

                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="newsletter" value="yes"> Please Subscribe me to
                        the monthly newsletter
                    </label>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </section>

        <!-- Employee Profiles Section -->
        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <div class="employee-profiles">
                <div class="employee-card">
                    <img src="images/Employee 1.webp" alt="Sarah Johnson">
                    <p>Sarah Johnson</p>
                    <div class="employee-title">Lead Guide</div>
                </div>

                <div class="employee-card">
                    <img src="images/Employee 2.webp" alt="Mike Thompson">
                    <p>Mike Thompson</p>
                    <div class="employee-title">Trip Planner</div>
                </div>

                <div class="employee-card">
                    <img src="images/Employee 3.webp" alt="Emily Rodriguez">
                    <p>Emily Rodriguez</p>
                    <div class="employee-title">Customer Experience</div>
                </div>
            </div>
        </section>
    </main>


    <footer>
        <p>© 2026 White Water Rafting | Kabanda Ronald</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook Icon">
            </a>

            <a href="https://twitter.com">
                <img src="images/twitter.png" alt="Twitter Icon">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
